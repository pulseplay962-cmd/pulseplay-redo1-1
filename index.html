<!DOCTYPE html>
<html>
<head>
  <title>PulsePlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #020617, #0f172a);
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 5px;
    }

    .tagline {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .live-status {
      font-weight: bold;
      margin: 10px 0;
    }

    iframe {
      border-radius: 12px;
      width: 100%;
      height: 500px;
    }

    .buttons {
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .twitch {
      background: #9146FF;
      color: white;
    }

    .follow {
      background: #38bdf8;
      color: black;
    }

    .section {
      margin-top: 50px;
    }

    .clips {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .clip-box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      margin-top: 60px;
      opacity: 0.5;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎮 PulsePlay</h1>
  <p class="tagline">Elite gameplay. Tactical dominance. Powered by VeilTactician.</p>

  <h2 id="liveStatus" class="live-status">⚫ Offline</h2>

  <!-- Twitch Stream -->
  <iframe
    src="https://player.twitch.tv/?channel=veiltactician&parent=pulseplay.online"
    allowfullscreen>
  </iframe>

  <div class="buttons">
    <a class="btn twitch" href="https://twitch.tv/veiltactician" target="_blank">
      🎥 Watch on Twitch
    </a>

    <a class="btn follow" href="https://twitch.tv/veiltactician" target="_blank">
      🔔 Follow Channel
    </a>
  </div>

  <!-- Clips Section -->
  <div class="section">
    <h2>🔥 Top Plays</h2>

    <div class="clips">
      <div class="clip-box">Clip coming soon</div>
      <div class="clip-box">Clip coming soon</div>
      <div class="clip-box">Clip coming soon</div>
    </div>
  </div>

  <!-- Future Merch Section -->
  <div class="section">
    <h2>🛒 Merch Coming Soon</h2>
    <p>PulsePlay gear is on the way 👀</p>
  </div>

  <footer>
    © 2026 PulsePlay | VeilTactician
  </footer>

</div>

<script>
async function checkLive(){
  try{
    const res = await fetch("https://pulseplay-api.onrender.com/live-status");
    const data = await res.json();

    const status = document.getElementById("liveStatus");
    const stats = document.getElementById("streamStats");

    if(data.data.length > 0){
      const stream = data.data[0];

      status.textContent = "🔴 LIVE NOW";
      status.style.color = "red";

      stats.innerHTML = `👀 ${stream.viewer_count} viewers | 🎮 ${stream.game_name}`;
    } else {
      status.textContent = "⚫ OFFLINE";
      status.style.color = "gray";

      stats.innerHTML = "Follow to get notified when live";
    }

  } catch(e){
    document.getElementById("liveStatus").textContent = "Error loading status";
  }
}

checkLive();
setInterval(checkLive, 60000);
</script>

</body>
</html>
