<!DOCTYPE html>
<html>
<head>
  <title>PulsePlay</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b0b0f">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
    }

    nav {
      padding: 15px;
      background: #111;
      display: flex;
      justify-content: space-between;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: #16161d;
      padding: 12px;
      border-radius: 12px;
    }

    .btn {
      padding: 10px;
      background: purple;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav>
  <b>⚡ PulsePlay</b>
</nav>

<div class="container">

  <input id="email" placeholder="email">
  <button class="btn" onclick="login()">Login</button>

  <h2 id="status">Loading...</h2>

  <h3>📊 Dashboard</h3>
  <div class="grid" id="dashboard"></div>

  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard"></div>

  <h3>🔥 Clips</h3>
  <div class="grid" id="clips"></div>

</div>

<script>
const API = "https://api.pulseplay.online";

// PWA
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

// NOTIFY
async function notify(msg) {
  if (Notification.permission !== "granted") {
    await Notification.requestPermission();
  }
  new Notification(msg);
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", email);
    load();
  }
}

// AI SCORE
async function scoreClip(c) {
  const res = await fetch(`${API}/score-clip`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      title: c.title,
      views: c.view_count
    })
  });

  return await res.json();
}

// LOAD
async function load() {

  // analytics
  const a = await fetch(`${API}/analytics`);
  const ad = await a.json();

  document.getElementById("status") =
    ad.live ? "LIVE" : "OFFLINE";

  // clips
  const c = await fetch(`${API}/clips`);
  const cd = await c.json();

  const clips = document.getElementById("clips");
  clips.innerHTML = "";

  for (const clip of cd.data) {
    const score = await scoreClip(clip);

    clips.innerHTML += `
      <div class="card">
        <img src="${clip.thumbnail_url}" width="100%">
        <p>${clip.title}</p>
        <p>AI Score: ${score.score}/100</p>
        <p>${clip.view_count} views</p>
        <a href="${clip.url}" target="_blank">Open</a>
      </div>
    `;

    if (score.score > 80) {
      notify("🔥 Viral clip detected!");
    }
  }

  // leaderboard
  const lb = await fetch(`${API}/leaderboard`);
  const lbd = await lb.json();

  document.getElementById("leaderboard").innerHTML =
    lbd.map(u =>
      `<div class="card">${u.email} - ${u.points}</div>`
    ).join("");
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
