<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PulsePlay</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    nav {
      padding: 15px;
      background: #111;
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      padding: 40px;
    }

    .glow {
      font-size: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: purple;
      color: white;
      text-decoration: none;
      margin-top: 15px;
      border-radius: 6px;
    }

    iframe {
      margin-top: 20px;
      width: 80%;
      height: 400px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<nav>
  <a href="#">Home</a>
  <a href="#">Clips</a>
  <a href="#">Schedule</a>
</nav>

<section class="hero">
  <h1 class="glow" id="liveStatus">Loading...</h1>
  <div id="streamStats"></div>

  <a class="btn" href="https://twitch.tv/VeilTactician" target="_blank">
    WATCH STREAM
  </a>

  <iframe
    src="https://player.twitch.tv/?channel=VeilTactician&parent=pulseplay.online"
    frameborder="0"
    allowfullscreen>
  </iframe>
</section>

<section>
  <h2>🔥 Latest Clips</h2>
  <div class="grid" id="clips"></div>
</section>

<script>
const API = "https://https://pulseplay-redo1-ibc3.onrender.com";

async function loadData() {
  try {
    // 🎮 LIVE STATUS
    const res = await fetch(`${API}/analytics`);
    const data = await res.json();

    const status = document.getElementById("liveStatus");
    const stats = document.getElementById("streamStats");

    if (data.live) {
      status.textContent = "🔴 LIVE NOW";
      stats.textContent = `${data.stream.viewer_count} viewers | ${data.stream.game_name}`;
    } else {
      status.textContent = "⚫ OFFLINE";
      stats.textContent = "Follow to get notified";
    }

    // 🎬 CLIPS
    const clipRes = await fetch(`${API}/clips`);
    const clipData = await clipRes.json();

    const clipsDiv = document.getElementById("clips");

    clipData.data.forEach(clip => {
      const el = document.createElement("div");
      el.className = "card";

      el.innerHTML = `
        <a href="${clip.url}" target="_blank">
          <img src="${clip.thumbnail_url}" width="100%">
          <p>${clip.title}</p>
        </a>
      `;

      clipsDiv.appendChild(el);
    });

  } catch (err) {
    document.getElementById("liveStatus").textContent = "Error loading data";
  }
}

loadData();
</script>

</body>
</html>
