<!DOCTYPE html>
  <h1>⚡ PulsePlay</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Clips</a>
    <a href="#">Schedule</a>
    <a href="#">Community</a>
  </nav>
</header>

<section class="hero">
  <h1 class="glow" id="liveStatus">Checking Stream...</h1>
  <div class="stats" id="streamStats"></div>

  <a class="btn" href="https://twitch.tv/VeilTactician">WATCH STREAM</a>

  <iframe src="https://player.twitch.tv/?channel=VeilTactician&parent=pulseplay.online"></iframe>
</section>

<section class="section">
  <h2>🔥 Featured Clips</h2>
  <div class="grid">
    <div class="card">Coming Soon</div>
    <div class="card">Coming Soon</div>
    <div class="card">Coming Soon</div>
  </div>
</section>

<script>

// ⚠️ YOU MUST REPLACE THIS WITH YOUR TWITCH CLIENT ID
const CLIENT_ID = "woe0tv277ijiub4niaren8aig61uciYOUR_TWITCH_CLIENT_ID";
const USERNAME = "VeilTactician";

async function getAccessToken(){
  const res = await fetch("https://id.twitch.tv/oauth2/token?client_id="+CLIENT_ID+"&grant_type=client_credentials",{
    method:"POST"
  });
  const data = await res.json();
  return data.access_token;
}

async function checkLive(){
  try{
    const token = await getAccessToken();

    const res = await fetch(`https://api.twitch.tv/helix/streams?user_login=${USERNAME}`,{
      headers:{
        "Client-ID":CLIENT_ID,
        "Authorization":"Bearer "+token
      }
    });

    const data = await res.json();

    const status = document.getElementById("liveStatus");
    const stats = document.getElementById("streamStats");

    if(data.data.length > 0){
      const stream = data.data[0];

      status.textContent = "🔴 LIVE NOW";
      document.body.classList.add("live");

      stats.innerHTML = `👀 ${stream.viewer_count} viewers | 🎮 ${stream.game_name}`;

    } else {
      status.textContent = "⚫ OFFLINE";
      stats.innerHTML = "Follow to get notified when live";
    }

  }catch(e){
    document.getElementById("liveStatus").textContent = "Error loading status";
  }
}

checkLive();

</script>

</body>
</html>
